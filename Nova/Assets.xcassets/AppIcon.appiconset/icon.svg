<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient - paper texture feel -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <!-- Orb radial gradient - ink sphere -->
    <radialGradient id="orb" cx="50%" cy="48%" r="28%">
      <stop offset="0%" stop-color="#5a5a7a"/>
      <stop offset="35%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <!-- Orb glow -->
    <radialGradient id="orbGlow" cx="50%" cy="48%" r="35%">
      <stop offset="0%" stop-color="#5a5a7a" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#2a2a3a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- Core highlight -->
    <radialGradient id="coreHighlight" cx="45%" cy="40%" r="18%">
      <stop offset="0%" stop-color="#8888aa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5a5a7a" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle paper texture filter -->
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- Soft shadow for orb -->
    <filter id="orbShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Particle blur -->
    <filter id="particleBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <!-- Orbit path blur -->
    <filter id="orbitBlur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- iOS icon mask: rounded rect (will be masked by iOS, but fill full square) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle paper texture overlay -->
  <rect width="1024" height="1024" fill="url(#bg)" filter="url(#noise)" opacity="0.03"/>

  <!-- Orb ambient glow -->
  <circle cx="512" cy="490" r="280" fill="url(#orbGlow)"/>

  <!-- Main ink orb with shadow -->
  <g filter="url(#orbShadow)">
    <circle cx="512" cy="490" r="195" fill="url(#orb)"/>
  </g>

  <!-- Core highlight reflection -->
  <circle cx="490" cy="460" r="120" fill="url(#coreHighlight)"/>

  <!-- Small bright specular highlight -->
  <ellipse cx="470" cy="435" rx="35" ry="25" fill="#9999bb" opacity="0.25"/>
  <ellipse cx="465" cy="430" rx="15" ry="10" fill="#bbbbdd" opacity="0.3"/>

  <!-- Orbital ring 1 - tilted ellipse -->
  <ellipse cx="512" cy="490" rx="270" ry="90" fill="none" stroke="#2a2a3a" stroke-width="1.2" opacity="0.18" transform="rotate(-25, 512, 490)" filter="url(#orbitBlur)"/>

  <!-- Orbital ring 2 - different tilt -->
  <ellipse cx="512" cy="490" rx="310" ry="70" fill="none" stroke="#2a2a3a" stroke-width="0.9" opacity="0.12" transform="rotate(15, 512, 490)" filter="url(#orbitBlur)"/>

  <!-- Scattered particles around the orb - ink dots -->
  <!-- Inner ring particles (closer, larger, darker) -->
  <circle cx="350" cy="420" r="4.5" fill="#1a1a2e" opacity="0.35" filter="url(#particleBlur)"/>
  <circle cx="680" cy="440" r="3.8" fill="#1a1a2e" opacity="0.3" filter="url(#particleBlur)"/>
  <circle cx="410" cy="620" r="3.2" fill="#2a2a3a" opacity="0.28" filter="url(#particleBlur)"/>
  <circle cx="640" cy="610" r="4" fill="#1a1a2e" opacity="0.32" filter="url(#particleBlur)"/>
  <circle cx="320" cy="530" r="3" fill="#2a2a3a" opacity="0.25" filter="url(#particleBlur)"/>
  <circle cx="710" cy="520" r="3.5" fill="#1a1a2e" opacity="0.28" filter="url(#particleBlur)"/>
  <circle cx="440" cy="330" r="3.8" fill="#2a2a3a" opacity="0.22" filter="url(#particleBlur)"/>
  <circle cx="600" cy="340" r="3" fill="#1a1a2e" opacity="0.2" filter="url(#particleBlur)"/>

  <!-- Mid ring particles (medium distance) -->
  <circle cx="280" cy="380" r="2.8" fill="#2a2a3a" opacity="0.18" filter="url(#particleBlur)"/>
  <circle cx="750" cy="400" r="2.5" fill="#2a2a3a" opacity="0.16" filter="url(#particleBlur)"/>
  <circle cx="300" cy="600" r="2.2" fill="#1a1a2e" opacity="0.15" filter="url(#particleBlur)"/>
  <circle cx="730" cy="590" r="2.8" fill="#2a2a3a" opacity="0.17" filter="url(#particleBlur)"/>
  <circle cx="380" cy="280" r="2" fill="#2a2a3a" opacity="0.13" filter="url(#particleBlur)"/>
  <circle cx="660" cy="290" r="2.3" fill="#1a1a2e" opacity="0.14" filter="url(#particleBlur)"/>
  <circle cx="260" cy="490" r="2.5" fill="#2a2a3a" opacity="0.15" filter="url(#particleBlur)"/>
  <circle cx="770" cy="480" r="2" fill="#1a1a2e" opacity="0.13" filter="url(#particleBlur)"/>

  <!-- Outer ring particles (far, small, faint) -->
  <circle cx="220" cy="350" r="1.8" fill="#2a2a3a" opacity="0.1" filter="url(#particleBlur)"/>
  <circle cx="800" cy="370" r="1.5" fill="#2a2a3a" opacity="0.08" filter="url(#particleBlur)"/>
  <circle cx="240" cy="650" r="1.6" fill="#1a1a2e" opacity="0.09" filter="url(#particleBlur)"/>
  <circle cx="790" cy="630" r="1.8" fill="#2a2a3a" opacity="0.1" filter="url(#particleBlur)"/>
  <circle cx="340" cy="240" r="1.3" fill="#2a2a3a" opacity="0.07" filter="url(#particleBlur)"/>
  <circle cx="700" cy="250" r="1.5" fill="#1a1a2e" opacity="0.08" filter="url(#particleBlur)"/>
  <circle cx="200" cy="500" r="1.5" fill="#2a2a3a" opacity="0.08" filter="url(#particleBlur)"/>
  <circle cx="830" cy="510" r="1.3" fill="#1a1a2e" opacity="0.07" filter="url(#particleBlur)"/>
  <circle cx="480" cy="220" r="1.5" fill="#2a2a3a" opacity="0.08" filter="url(#particleBlur)"/>
  <circle cx="550" cy="760" r="1.6" fill="#1a1a2e" opacity="0.09" filter="url(#particleBlur)"/>
  <circle cx="480" cy="750" r="1.3" fill="#2a2a3a" opacity="0.07" filter="url(#particleBlur)"/>
  <circle cx="560" cy="230" r="1.4" fill="#1a1a2e" opacity="0.07" filter="url(#particleBlur)"/>

  <!-- Tiny dust-like particles scattered very faintly -->
  <circle cx="180" cy="420" r="1" fill="#2a2a3a" opacity="0.05"/>
  <circle cx="850" cy="450" r="0.8" fill="#2a2a3a" opacity="0.04"/>
  <circle cx="420" cy="180" r="0.9" fill="#1a1a2e" opacity="0.05"/>
  <circle cx="610" cy="820" r="1" fill="#2a2a3a" opacity="0.05"/>
  <circle cx="170" cy="580" r="0.8" fill="#1a1a2e" opacity="0.04"/>
  <circle cx="860" cy="560" r="0.9" fill="#2a2a3a" opacity="0.04"/>
  <circle cx="510" cy="170" r="0.8" fill="#1a1a2e" opacity="0.04"/>
  <circle cx="520" cy="830" r="0.9" fill="#2a2a3a" opacity="0.05"/>

  <!-- Orbital point highlights - small bright dots on orbit paths -->
  <circle cx="365" cy="385" r="2.5" fill="#5a5a7a" opacity="0.4"/>
  <circle cx="660" cy="580" r="2" fill="#5a5a7a" opacity="0.35"/>
  <circle cx="580" cy="360" r="1.8" fill="#5a5a7a" opacity="0.3"/>
  <circle cx="440" cy="605" r="2.2" fill="#5a5a7a" opacity="0.35"/>
</svg>